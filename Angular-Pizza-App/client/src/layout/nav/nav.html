<div class="navbar bg-base-100 shadow-sm">
  <!-- Logo -->
  <div class="navbar-start">
    <a class="btn btn-ghost text-xl">Order-Pizza</a>
  </div>

  @if (accountService.currentUser()) {
    <!-- Desktop Menu (Centered) -->
    <div class="navbar-center hidden lg:flex">
      <ul class="menu menu-horizontal px-1">
        <li>
          <a [routerLink]="routerLinks.orders" routerLinkActive="text-primary">Order Pizza</a>
        </li>
        <li>
          <a [routerLink]="routerLinks['order-history']" routerLinkActive="text-primary"
            >My Order History</a
          >
        </li>
      </ul>
    </div>

    <!-- End: Button + Mobile Hamburger -->
    <div class="navbar-end gap-2">
      <!-- Desktop Button -->
      <a class="btn btn-primary btn-sm hidden lg:flex" (click)="accountService.clearUser()"
        >Log Out</a
      >

      <!-- Mobile Hamburger -->
      <div class="dropdown dropdown-end lg:hidden">
        <label tabindex="0" class="btn btn-ghost btn-square">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 6h16M4 12h8m-8 6h16"
            />
          </svg>
        </label>
        <ul
          tabindex="0"
          class="menu menu-sm dropdown-content mt-3 z-10 p-2 shadow bg-base-100 rounded-box w-52"
        >
          <li>
            <a [routerLink]="routerLinks.orders" routerLinkActive="text-primary">Order Pizza</a>
          </li>
          <li>
            <a [routerLink]="routerLinks['order-history']" routerLinkActive="text-primary"
              >My Order History</a
            >
          </li>
          <li>
            <a class="btn btn-primary btn-sm mt-2" (click)="accountService.clearUser()">Log Out</a>
          </li>
        </ul>
      </div>
    </div>
  }
</div>
