<form [formGroup]="loginForm" class="flex flex-col gap-2 w-full" (ngSubmit)="onSubmit()">
  <input
    type="text"
    placeholder="Your Name"
    class="input w-full"
    [class.input-error]="clientName?.invalid && clientName?.touched"
    formControlName="clientName"
  />
  <input
    type="text"
    placeholder="Your Address"
    class="input w-full"
    [class.input-error]="address?.invalid && address?.touched"
    formControlName="address"
  />
  <button class="btn btn-primary w-full lg:w-1/2 p-3 lg:p-0 self-center" type="submit">
    Enter Pizza
  </button>
</form>
